<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vidyalaya Office - Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f12;
      color: #e5e5e5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .container {
      text-align: center;
      padding: 2rem;
      max-width: 480px;
    }
    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 1.5rem;
      border-radius: 20px;
      background: linear-gradient(135deg, #7c73e6, #5a52d5);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
    }
    h1 {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
      color: #7c73e6;
    }
    p {
      color: #9ca3af;
      margin-bottom: 1.5rem;
      line-height: 1.6;
    }
    .retry-btn {
      background: #7c73e6;
      color: white;
      border: none;
      padding: 0.75rem 2rem;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .retry-btn:hover { opacity: 0.9; }
    .features {
      margin-top: 2rem;
      text-align: left;
      background: #1a1a24;
      border-radius: 12px;
      padding: 1.5rem;
    }
    .features h3 {
      font-size: 0.875rem;
      color: #7c73e6;
      margin-bottom: 0.75rem;
    }
    .features li {
      color: #9ca3af;
      font-size: 0.875rem;
      padding: 0.25rem 0;
      list-style: none;
    }
    .features li::before {
      content: "✓ ";
      color: #16a34a;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">V</div>
    <h1>You're Offline</h1>
    <p>Don't worry — your documents are saved locally and will sync when you reconnect.</p>
    <button class="retry-btn" onclick="window.location.reload()">Try Again</button>
    <div class="features">
      <h3>Available Offline</h3>
      <ul>
        <li>View and edit cached documents</li>
        <li>Create new documents locally</li>
        <li>Changes auto-saved to device</li>
        <li>Auto-sync when back online</li>
      </ul>
    </div>
  </div>
</body>
</html>
